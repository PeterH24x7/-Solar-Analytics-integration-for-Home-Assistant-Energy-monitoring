      # Solar Analytics Energy history sensor for graphing each channel (e.g. in Apex Charts).
      # The units are in kW.
      #
      # Note: results are actually 5 minute average power, with area under the graph being the energy
      # usage within that time interval. The time duration is limited to 28x 5 minute intervals
      # (= 2h20m) as this fits within the 255 character max allowed by the state of a sensor.
      # Rounding to a reduced number of decimal places (e.g. 1 instead of 2) could increase
      # the number of intervals if that's desireable, but at a lower resolution.
      #
      # Return values: numeric array if available, else previous else empty array [].
      #
      - name: sa_data_by_5min_history_time_stamp
        unique_id: sa_data_by_5min_history_time_stamp
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0, sensor_values=[] ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for sensor_data in value_json.data -%}
              {%- if (loop.index > (ns.last_data - 28)) and (loop.index <= ns.last_data) -%}
                {%- set ns.sensor_values = ns.sensor_values 
                    + [ as_timestamp(sensor_data.t_stamp)|timestamp_custom('%H:%M') ] -%}              
              {%- endif -%}
            {%- endfor -%}
            {{- ns.sensor_values -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_time_stamp')|default([]) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

