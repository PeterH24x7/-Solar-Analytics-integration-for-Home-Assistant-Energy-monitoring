      # Additional "raw" sensors associated with Electric Vehicle charging broken down 
      # by generated and imported energy sources.
      #
      # Return values: numeric if available, else previous value else default 0.0.
      #

      # Major load energy apportionment logic (generated vs imported)
      #
      # Solar energy is allocated to loads using a strict priority order based on
      # controllability: the least controllable loads are satisfied first, and the
      # most flexible load (EV) receives only any remaining surplus. The implemented
      # priority stack is:
      #
      #     Other → Stove (ST) → Hot Water (HW) → Air Conditioning (AC) → EV
      #
      # For each device, solar generation is effectively calculated as the portion
      # of total generation remaining after all higher-priority loads have been
      # satisfied. Any remaining unmet demand is assigned as imported (grid energy).
      # This ensures deterministic, non-overlapping allocation where energy balance
      # is preserved:
      #
      #     generated + imported = total consumption
      #
      # The EV acts as a flexible balancing load, absorbing surplus solar when
      # available or taking the full deficit when solar is insufficient.
      #
      # Example (kWh over period):
      #
      # Load    | Total | Solar (Generated) | Grid (Imported)
      # --------|-------|-------------------|-----------------
      # Other   |   1   |     1             |    0
      # Stove   |   1   |     1             |    0
      # HW      |   2   |     2             |    0
      # AC      |   4   |     4             |    0
      # EV      |   5   |     0             |    5
      # --------|-------|-------------------|-----------------
      # TOTAL   |  13   |     8             |    5
      #
      # General allocation model:
      #
      #   generated_device = min(load, max(0, solar - prior_loads))
      #   imported_device  = min(load, max(0, prior_loads - solar))
      #
      # where:
      #   prior_loads = sum of all higher-priority device loads
      #
      # This approach guarantees:
      #   - No double counting of solar energy
      #   - Strict priority enforcement
      #   - Stable totals suitable for state_class: total_increasing
      #
      - name: sa_data_by_5min_load_ev_charger_generated
        unique_id: sa_data_by_5min_load_ev_charger_generated
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( ev_generated=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- set load_ev = sensor_data.load_ev_charger
                  if sensor_data.load_ev_charger is number else 0.0 -%}
              {%- set consumed = sensor_data.energy_consumed
                  if sensor_data.energy_consumed is number else 0.0 -%}
              {%- set generated = sensor_data.energy_generated
                  if sensor_data.energy_generated is number else 0.0 -%}
              {%- if load_ev > 0 -%}
                {#- Only positive generation contributes -#}
                {%- if generated < 0.0 -%}
                  {%- set generated = 0.0 -%}
                {%- endif -%}
                {#- EV gets lowest priority → no prior loads subtracted -#}
                {%- set excess = generated - (consumed - load_ev) -%}
                {%- if excess <= 0 -%}
                  {#- set ns.ev_generated = ns.ev_generated -#}
                {%- elif excess >= load_ev -%}
                  {%- set ns.ev_generated = ns.ev_generated + load_ev -%}
                {%- else -%}
                  {%- set ns.ev_generated = ns.ev_generated + excess -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.ev_generated|float(0.0)|round(4) -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_load_ev_charger_generated')|float(0.0) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('load_ev_charger','defined')|
                map(attribute='load_ev_charger')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_load_ev_charger_imported
        unique_id: sa_data_by_5min_load_ev_charger_imported
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( ev_imported=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- set load_ev = sensor_data.load_ev_charger
                  if sensor_data.load_ev_charger is number else 0.0 -%}
              {%- set consumed = sensor_data.energy_consumed
                  if sensor_data.energy_consumed is number else 0.0 -%}
              {%- set generated = sensor_data.energy_generated
                  if sensor_data.energy_generated is number else 0.0 -%}
              {%- if load_ev > 0.0 -%}
                {#- Only positive generation contributes -#}
                {%- if generated < 0.0 -%}
                  {%- set generated = 0.0 -%}
                {%- endif -%}
                {#- If house consumption is greater than/equal to generation, some import exists -#}
                {%- if consumed >= generated -%}
                  {#- If generation is less than/equal to (home - EV), EV is fully imported -#}
                  {%- if generated <= (consumed - load_ev) -%}
                    {%- set ns.ev_imported = ns.ev_imported + load_ev -%}
                  {#- Otherwise EV is partially imported by (home - generation) -#}
                  {%- else -%}
                    {%- set ns.ev_imported = ns.ev_imported + (consumed - generated) -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.ev_imported|float(0.0)|round(4) -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_load_ev_charger_imported')|float(0.0) -}}
          {%- endif -%}  
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('load_ev_charger','defined')|
                map(attribute='load_ev_charger')|select('is_number')|list|length ) > 0 -}}
