# -----------------------------------------------------------------------------
# >>> RELEASE 10-- FINAL <<< SOLAR_ANALYTICS_ADVANCED.YAML SOLUTION
#
# Release 10 hardens all template sensors against loops, resets, startup conditions and 
# invalid data while preserving backward-compatible behaviour. See update notes for more info.
#
# SOLAR ANALYTICS integration for Home Assistant Energy Monitoring
#
# Configurations:
#                 - solar_analytics_3phase.yaml - consumed and generated sensors only.
#                 - solar_analytics_battery.yaml [NEW 27-Jan-25] - includes consumed, generated
#                     and battery sensors.
#                 - solar_analytics.yaml - consumed and generaged, plus load sensors for
#                     hot_water, air_conditioner, ev_charger and stove.
#                     Note: other known, but not implemented, SA load types include load_lighting
#                     load_tenant and load_garage.
#     [THIS FILE] - solar_analytics_advanced.yaml - sensors as per solar_analytics, plus
#                     load energy broken into imported and generated sources.
# 
# Developed by Peter Hormann and with thanks to Glen S and Roving-Ronin for their contributions.
#
# Created: 7-Jan-2022
#
# Last updated: 25-Jun-26 as Release 10 - see update notes below.
#
# Updates:
#     16-Jan-2022 - INITIAL RELEASE 1
#                   ...
#     2022 - 2024 - Old redundant release notes deleted.
#                   ...
#       10-Feb-25 - RELEASE 9 - MINOR ADDITION TO HISTORY SENSOR ONLY.
#                 - Added new history sensor - sa_data_by_5min_history_imported_exported. Included as
#                   new attribute in sa_todays_energy_history.
#                 - Modified sa_data_by_5min_history_energy_generated to only include +ve values.
#                 - Minor code redo to align with solar_analytics_battery.yaml functioning.
#                 - Added last5min energy attribute to sa_todays_xloadx_total and
#                   sa_todays_energy_imported/exported sensors. Units are Wh.
#       25-Jun-26 - RELEASE 10 - MAJOR INTERNAL OVERHAUL, BUT EXTERNALLY UNCHANGED BEHAVIOUR
#                 - Migrated to modern template sensor patterns for future HA compatibility.
#                 - Fixed generation allocation logic to suppress negative xx_energy_last5min 
#                   generation attributes, ensuring physically valid solar contribution and more 
#                   accurate cost attribution.
#                 - Enhanced history sensors to mask invalid periods (all-zero/none data) by 
#                   persisting and reusing the last valid value, improving continuity and visual 
#                   accuracy of energy trends
#                 - Added change-guard logic to prevent unnecessary and repeated state updates.
#                 - Improved reset detection with large drop threshold (old - new > RESET_THRESHOLD)
#                   check. Ensures reliable midnight resets for continuous-load systems while 
#                   ignoring small drift/rounding noise.
#                 - Added numeric-safe fallback handling to ensure valid sensor states during 
#                   startup.
#                 - Eliminated template loops using `this.state` and state-preserving update logic
#                   for non-raw energy (e.g. sa_todays_...) and power (e.g. sa_consumed_power) 
#                   sensors.
#                 - Introduced monotonic decrease protection for derived total_increasing sensors 
#                   (import/export/battery splits) to prevent small decreases caused by rounding, unit 
#                   conversion (Wh ↔ kWh) and calculation drift.
#                 - Improved overall data validation, stability and resilience across all sensors.
#                 - Maintained full backward compatibility of entity names, outputs and dashboards.
#
# This code is provided as-is and without any warrantee or guarantees.
# Further public contributions and enhancements are welcomed.
#
# INSTALLATION - NEW:
#   1. Copy this yaml file to the Home Assistant (HA) config folder.
#   2. Include this file name as a package in the HA configuration.yaml.
#      For example -
#        packages:
#          pack_1: !include solar_analytics.yaml
#   3. Define sa_username, sa_password and sa_site_id (e.g. 36304) in the secrets.yaml file (see
#      example on github).
#   4. Using HA Developer Tools check the configuration and restart.
#   5. Go to HA Settings and then search for “Energy Configuration” to make the changes to the Energy
#      Dashboard Configuration. #nter the details for:
#      > Grid consumption - as sa_todays_energy_imported
#      > Return to grid - as sa_todays_energy_exported
#      > Solar production - as sa_todays_energy_generated_total
#   6. Add the energy load sensors to the HA Energy Dashboard as "Monitor Individual Devices".
#   7. If all is working is correctly, the Energy Dashboard should start populating data within
#      a couple of hours.
#   8. If the HA Dashboard "Grid Consumption" and "Return to grid" are configured with energy unit pricing
#      details, then the sa_todays_energy_imported_cost and sa_todays_energy_exported_compensation sensors
#      will be auto-created by the Energy Dashboard. These sensors can be found as hidden Entities
#      (which can't be changed or deleted). If all good, then the sa_todays_energy_import_rate
#      (daily av. $/kWh), sa_todays_energy_export_rate (daily av. $/kWh) and
#      sa_todays_energy_total_net_cost ($) should work without further config. If no pricing
#      is set, then optionally delete these 3x sensors from the configuration.
#   9. Enjoy!
#
# UPGRADING - FROM A PREVIOUS VERSION:
#   This upgrade should not break the sensors created in a previous versions. It's recommended that the
#   previous version solar_analytics.yaml should be deleted/renamed, HA restarted, the new solar_analytics.yaml
#   copied to the <config> folder and then HA restarted again. The sensors should start repopulating
#   within their refresh timecycles. If any duplicate sensors happen to be created, go to HA Settings ->
#   Devices & Services -> Entities and delete any "sa_..." prefixed sensors showing as unavailable or
#   disabled, then restart once more and the correctly named sensor and its data should be restored
#   to normal. Alternatively go to 'Developer Tools -> Actions' and select 'Purge entities,
#   recorder purge.entities' and then 'entity_id' and then enter a list of entities needing to be purged.
#
# If you find my work useful, please buy me a coffee ... thank you!
#   https://www.buymeacoffee.com/peter24x7
#
# Reference for more information and updates:
#   https://github.com/PeterH24x7/-Solar-Analytics-integration-for-Home-Assistant-Energy-monitoring
#
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# INPUT_TEXT
input_text:
  # Define the Solar Analytics site_id value is required in URLs used in gets below - e.g. 36304.
  # See the Solar Analytics user portal to find your site id or see the collected sa_site_list
  # attributes as defined below.
  sa_site_id:
    initial: !secret sa_site_id

# -----------------------------------------------------------------------------
# TIMERS
timer:
  # Timer for triggering refresh before token expiry.
  sa_token_expiry_timer:
    duration: 0
    icon: mdi:clock-check
    restore: true

# -----------------------------------------------------------------------------
# AUTOMATIONS
automation:
  # Automation to restart timer when the authentication token is refreshed.
  - id: "sa_token_expiry_update"
    alias: SA Token Expiry update
    description: ""
    trigger:
      - platform: state
        entity_id:
          - sensor.sa_auth_token
        for:
          hours: 0
          minutes: 0
          seconds: 5
    condition: 
      - condition: template
        value_template: "{{- states('sensor.sa_auth_token') is number -}}"
    action:
      - service: timer.start
        data:
          duration: "{{- states('sensor.sa_auth_token')|int(0) -}}"
        target:
          entity_id: timer.sa_token_expiry_timer
    mode: single

  # Automation to refresh the token when the timer expires.
  - id: "sa_token_refresh_on_timer_expiry"
    alias: SA Token refresh on Timer expiry
    description: ""
    trigger:
      - platform: state
        entity_id:
          - timer.sa_token_expiry_timer
        to: idle
        for:
          hours: 0
          minutes: 0
          seconds: 5
    condition: []
    action:
      - service: homeassistant.update_entity
        data: {}
        target:
          entity_id: sensor.sa_auth_token
    mode: single

  # Automated trigger for sa_data_by_5min_... sensors - fires every 5 minutes.
  ##### In case of network problems add 1min extra offset as follows:
  ##### >>>>> condition: "{{- ( (now().minute + 1) is divisibleby(5) ) and ( ( (now().second // 10) + (states('input_text.sa_site_id')|int(0) % 6) ) == 5 ) -}}"
  - id: "sa_data_by_5min_trigger"
    alias: SA Data by 5min Trigger
    description: "Every 5 minutes trigger offset by 3 minutes (e.g. 3, 8, 13) plus offset by multiples of 10s of seconds"
    trigger:
      - platform: time_pattern
        seconds: "/10"
    condition: >-
      {{- ( (now().minute + 2) is divisibleby(5) ) 
          and ( ( ( now().second // 10) + (states('input_text.sa_site_id')|int(0) % 6) ) == 5 ) -}}
    action:
      - service: homeassistant.update_entity
        data: {}
        target:
          entity_id: sensor.sa_data_by_5min_time_stamp
    mode: single

  # Automated trigger for sa_live_site_data_... sensors - fires every minute.
  - id: "sa_live_site_data_trigger"
    alias: SA Live Site Data Trigger
    description: "Every 1 minute trigger offset by 30 seconds plus offset by multiples of 5 seconds"
    trigger:
      - platform: time_pattern
        seconds: "/5"
    condition: >-
      {{- ( (now().second // 10) >= 3 ) 
          and ( (now().second // 5) + (states('input_text.sa_site_id')|int(0) % 6) == 11 ) -}}
    action:
      - service: homeassistant.update_entity
        data: {}
        target:
          entity_id: sensor.sa_live_site_data_time_stamp
    mode: single

  # Automated trigger for sa_data_by_hour_... sensors fires every hour.
  - id: "sa_data_by_hour_trigger"
    alias: SA Data By Hour Trigger
    description: "At 11 minutes past the hour trigger plus offset by multiples of 10s of seconds"
    trigger:
      - platform: time_pattern
        minutes: "11"
        seconds: "/10"
    condition: >-
      {{- ( (now().second // 10) + (states('input_text.sa_site_id')|int(0) % 6) ) == 5 -}}
    action:
      - service: homeassistant.update_entity
        data: {}
        target:
          entity_id: sensor.sa_data_by_hour_time_stamp
    mode: single

  # Home Assistant manual trigger to refresh all SA get sensors.
  - id: "sa_refresh_all_rest_gets"
    alias: SA Refresh all REST data gets
    description: "Useful start-up automation that can be manually run to refresh all REST data gets."
    trigger: []
    condition: []
    action:
      - service: homeassistant.update_entity
        data: {}
        target:
          entity_id:
            - sensor.sa_auth_token
            - sensor.sa_site_list
            - sensor.sa_status
            - sensor.sa_data_by_5min_time_stamp
            - sensor.sa_live_site_data_time_stamp
            - sensor.sa_data_by_hour_time_stamp
    mode: single

# -----------------------------------------------------------------------------
# REST GETS
rest:
  #
  # Solar Analytics - rest get of latest token using username and password credentials.
  # Auto updates every 2 hours, else on sa_token_expiry_timer via automation.
  - resource: "https://portal.solaranalytics.com.au/api/v3/token"
    authentication: basic
    username: !secret sa_username
    password: !secret sa_password
    scan_interval: 7200
    sensor:
      - name: sa_auth_token
        unique_id: sa_auth_token
        value_template: "{{- value_json['duration'] -}}"
        json_attributes:
          - "token"
          - "expires"
        availability: >-
          {{- (value_json is defined and value_json.token is defined) -}}

  #
  # Solar Analytics - get the site details associated with the given user account login.
  # Updated every hour.
  #
  # Note: assumes only a single device per account, there could be a second device (e.g. replaced
  # device due to fault/upgrade) at $.data.[1]
  - resource: "https://portal.solaranalytics.com.au/api/v3/site_list?hardware=true&capacity=true&subscription=true"
    headers:
      Authorization: >-
        {{- 'Bearer ' ~ state_attr('sensor.sa_auth_token','token') -}}
    scan_interval: 3600
    sensor:
      - name: sa_site_list
        unique_id: sa_site_list
        value_template: "{{- now() -}}"
        json_attributes_path: "$.data.[0]"
        json_attributes:
          - "e_status"
          - "fault_class"
          - "fault_id*"
          - "has_pv"
          - "mer_status"
          - "overall_status"
          - "retailer_user"
          - "s_cli_site_name"
          - "site_id"
          - "site_inactive"
          - "capacity"
          - "devices"
          - "sub_type"
        availability: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {{- (value_json.data|list|length) > 0 -}}
          {%- else -%}
            false
          {%- endif -%}

  #
  # Solar Analytics - get the site status for the specified site_id.
  # Updated every hour.
  #
  # 30-Oct-24 - extra attributes - not always available.
  #   Decided against use of unsupported v4 (not in public API, reporting showed
  #   some inconsistency w/ v3).
  #
  - resource_template:
      https://portal.solaranalytics.com.au/api/v3/site_status/{{-
      states('input_text.sa_site_id')
      -}}
    headers:
      Authorization: >-
        {{- 'Bearer ' ~ state_attr('sensor.sa_auth_token','token') -}}
    scan_interval: 3600
    sensor:
      - name: sa_status
        unique_id: sa_status
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {{- value_json.data.mer_status -}}
          {%- else -%}
            Invalid
          {%- endif -%}
        json_attributes_path: "$.data"
        json_attributes:
          - "dashboard_status"
          - "mer_status"
          - "mer_text"
          - "mer_percentage"

          - "fault_status"
          - "fault_type"
          - "fault_text"

          - "action_type"
          - "action_text"

          - "event_id"
          - "event_list"
        availability: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {{- (value_json.data.mer_status is defined) -}}
          {%- else -%}
            false
          {%- endif -%}

  #
  # Solar Analytics - get the site fault status for the specified site_id.
  # Updated every 5 minutes.
  #
  # Note: this is not a published API 'get', but is used by the SA portal to show a sites fault status (if any).
  - resource_template:
      https://portal.solaranalytics.com.au/api/v4/site_status/{{-
      states('input_text.sa_site_id')
      -}}?event_group=all
    headers:
      Authorization: >-
        {{- 'Bearer ' ~ state_attr('sensor.sa_auth_token','token') -}}
    scan_interval: 300
    sensor:
      - name: sa_status_log_entry
        unique_id: sa_status_log_entry
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set log_entry = value_json.data.event_list[0].fault_status|lower -%}
          {%- else -%}
            {%- set log_entry = "invalid" -%}
          {%- endif -%}
          {%- set status_map = {
            'resolved' : 'Good',
            'action_owner' : 'Check device',
            'moderate_under_production' : 'Under production',
            'zero_energy_production' : 'Zero production',
            'ongoing' : 'Ongoing problem',
            'unavailable' : 'API unavailable' }
            -%}
          {%- if log_entry in status_map -%}
            {{- status_map[log_entry] -}}
          {%- else -%}
            {{- log_entry -}}
          {%- endif -%}
        json_attributes_path: "$.data.event_list.[0]"
        json_attributes:
          - "fault_status"
          - "event_id"
          - "start_timestamp"
          - "end_timestamp"
          - "last_updated_at"
          - "severe_tag"
          - "event_type"
          - "fault_type"
          - "fault_class"
        availability: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {{- (value_json.data.event_list|list|length > 0) -}}
          {%- else -%}
            false
          {%- endif -%}

  #
  # Solar Analytics - get 5 minute energy data.
  # Used to calculate today's cumulative total energy for consumed, generated, imported and exported
  # energy as used by the HA Energy module.
  #
  # Updated on startup and every 5 minutes according to sa_data_by_5min_trigger.
  #
  - resource_template: https://portal.solaranalytics.com.au/api/v2/site_data/{{-
      states('input_text.sa_site_id')
      -}}?all=true&gran=minute&trunc=false&power=false&tstart={{-
      now().strftime("%Y%m%d")
      -}}&tend={{-
      now().strftime("%Y%m%d")
      -}}
    headers:
      Authorization: >-
        {{- 'Bearer ' ~ state_attr('sensor.sa_auth_token','token') -}}
    scan_interval: 0
    # REST SENSORS FOR sa_data_by_5min...
    sensor:

      # Timestamp of the latest energy data.
      # Return values: latest time_stamp if available, else previous time_stamp, default "none".
      #
      # Return values: latest time stamp else none if not available.
      #
      - name: sa_data_by_5min_time_stamp
        unique_id: sa_data_by_5min_time_stamp
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( time_stamp=none ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.time_stamp = sensor_data.t_stamp -%}
              {%- endif -%}
            {%- endfor -%} 
            {{- ns.time_stamp -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

      # Sensor that indicates that the energy sensors have reset to a single record
      # Should only occur at midnight each day, but may also occur if there are no recordings early in the day.
      #
      # Return values: non-boolean "False" if not reset, "True" if reset. Is none if unavailable.
      #
      - name: sa_data_by_5min_meter_reset
        unique_id: sa_data_by_5min_meter_reset
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {{- "True" if ns.last_data <= 1 else "False" -}}
          {%- else -%}
            none
          {%- endif -%}
        json_attributes_path: "$.data[0]"
        json_attributes: "t_stamp"
        availability: >-
          {{- value_json is defined and value_json.data is defined -}}

      # The last 5 minutes energy by sensor type per Solar Analytics channel.
      # These sensors may be useful for calculating energy cost where energy costs vary at intervals down
      # to 5 minutes (e.g. Amber Electric). The may also be useful for configuring "Utility Meter" helpers in HA.
      #
      # Return values: numeric if available, else none if not available.
      #
      - name: sa_data_by_5min_energy_consumed
        unique_id: sa_data_by_5min_energy_consumed
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( consumed=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- if (sensor_data.energy_consumed|float(0.0)) > 0.0 -%}
                  {%- set ns.consumed = sensor_data.energy_consumed -%}
                {%- else -%}
                  {%- set ns.consumed = 0.0 -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.consumed|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_energy_generated
        unique_id: sa_data_by_5min_energy_generated
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( generated=none ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_generated' in sensor_data and sensor_data.energy_generated is number) -%}
                {%- if (sensor_data.energy_generated|float(0.0)) > 0.0 -%}
                  {#- Only positive generation contributes -#}
                  {%- set ns.generated = sensor_data.energy_generated -%}
                {%- else -%}
                  {%- set ns.generated = 0.0 -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.generated|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_generated','defined')|
                map(attribute='energy_generated')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_imported
        unique_id: sa_data_by_5min_imported
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( imported=0.0, consumed_home=0.0, generated=0.0, battery=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- if ('battery_storage' in sensor_data and sensor_data.battery_storage is number) -%}
                  {%- set ns.battery = sensor_data.battery_storage -%}
                {%- endif -%}
                {#- Only positive generation contributes -#}
                {%- if ('energy_generated' in sensor_data and sensor_data.energy_generated is number)
                      and (sensor_data.energy_generated|float(0.0) > 0.0) -%}
                  {%- set ns.generated = sensor_data.energy_generated -%}
                {%- endif -%}
                {%- set ns.consumed_home = sensor_data.energy_consumed|float(0.0) 
                      + ( ns.battery|float(0.0) * 2.0 )|float(0.0) -%}
                {%- if ns.consumed_home|float(0.0) + ns.battery|float(0.0) >= ns.generated|float(0.0) -%}
                  {%- set ns.imported = ns.consumed_home|float(0.0) + ns.battery|float(0.0) - ns.generated|float(0.0) -%}
                {%- else -%}
                  {%- set ns.imported = 0.0 -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.imported|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_exported
        unique_id: sa_data_by_5min_exported
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( exported=0.0, consumed_home=0.0, generated=0.0, battery=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- if ('battery_storage' in sensor_data and sensor_data.battery_storage is number) -%}
                  {%- set ns.battery = sensor_data.battery_storage -%}
                {%- endif -%}
                {#- Only positive generation contributes -#}
                {%- if ('energy_generated' in sensor_data and sensor_data.energy_generated is number)
                      and (sensor_data.energy_generated|float(0.0) > 0.0) -%}
                  {%- set ns.generated = sensor_data.energy_generated -%}
                {%- endif -%}
                {%- set ns.consumed_home = sensor_data.energy_consumed|float(0.0) 
                      + ( ns.battery|float(0.0) * 2.0 )|float(0.0) -%}
                {%- if ns.generated|float(0.0) > ns.consumed_home|float(0.0) - ns.battery|float(0.0) -%}
                  {%- set ns.exported = ns.battery|float(0.0) + ns.generated|float(0.0) - ns.consumed_home|float(0.0) -%}
                {%- else -%}
                  {%- set ns.exported = 0.0 -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.exported|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

  #
