          energy_load_air_conditioner: >
            {{- states('sensor.sa_data_by_5min_history_load_air_conditioner') -}}
          energy_load_ev_charger: >
            {{- states('sensor.sa_data_by_5min_history_load_ev_charger') -}}
          energy_load_hot_water: >
            {{- states('sensor.sa_data_by_5min_history_load_hot_water') -}}
