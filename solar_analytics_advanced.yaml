            {%- set new_val = new|float(0.0) -%}
            {{- new_val if (new_val - old)|abs > 0.0001 else this.state|float(0.0) -}}
          {%- else -%}
            {{- this.state|float(0.0) if this.state is defined else 0.0 -}}
          {%- endif -%}
