        unique_id: sa_data_by_5min_history_energy_consumed
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0, sensor_values=[], current_value=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for sensor_data in value_json.data -%}
              {%- if (loop.index > (ns.last_data - 28)) and (loop.index <= ns.last_data) -%}
                {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                  {%- set ns.current_value = ((sensor_data.energy_consumed|float)*12.0/1000)|float(0.0)|round(2) -%}
                {%- else -%}
                  {#- data must be bad (none) - default to repeat last value -#}
                {%- endif -%}
                {%- set ns.sensor_values = ns.sensor_values + [ ns.current_value ] -%}
              {%- endif -%}
            {%- endfor -%}
