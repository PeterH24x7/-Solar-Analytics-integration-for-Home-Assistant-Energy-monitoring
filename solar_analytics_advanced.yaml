        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.last_data -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_time_stamp_count')|int(0) -}}
          {%- endif -%}
        json_attributes_path: "$.data[0]"
        json_attributes: "t_stamp"
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

  #
  # Solar Analytics - get live per minute power data.
  # Used to generate most recent power information.
  #
  # Note: this is not a published API 'get', but is used by the SA portal to display minute to
  # minute power for a site.
  #
  # Updated on startup and every 1 minute according to sa_live_site_data_trigger.
  #
  - resource_template:
      https://portal.solaranalytics.com.au/api/v3/live_site_data?site_id={{-
      states('input_text.sa_site_id')
      -}}&last_six=true
    headers:
      Authorization: >
        {{- 'Bearer ' ~ state_attr('sensor.sa_auth_token','token') -}}
    scan_interval: 0
    # REST SENSORS FOR sa_live_site_data...
    sensor:

      # Timestamp of the latest power data.
      # Return values: latest time stamp if available, else none.
      #
      - name: sa_live_site_data_time_stamp
        unique_id: sa_live_site_data_time_stamp
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( t_stamp=none ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('consumed' in sensor_data and sensor_data.consumed is number) -%}
                {%- set ns.t_stamp = as_timestamp(sensor_data.t_stamp)|timestamp_custom('%Y-%m-%d %H:%M:%S') -%}
              {%- endif -%}
            {%- endfor -%} 
            {{- ns.t_stamp -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('consumed','defined')|
                map(attribute='consumed')|select('is_number')|list|length ) > 0 -}}

      # Minutely updated "raw" power sensors as provided by Solar Analytics.
      #
      # Return values: numeric if available, else none.
      #
      - name: sa_live_site_data_consumed
        unique_id: sa_live_site_data_consumed
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( power=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('consumed' in sensor_data and sensor_data.consumed is number) -%}
                {%- set ns.power = sensor_data.consumed -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.power|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('consumed','defined')|
                map(attribute='consumed')|select('is_number')|list|length ) > 0 -}}

      - name: sa_live_site_data_generated
        unique_id: sa_live_site_data_generated
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( power=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('generated' in sensor_data and sensor_data.generated is number) -%}
                {#- Only positive generation contributes -#}
                {%- set ns.power = sensor_data.generated
                                    if sensor_data.generated|default(0.0)|float(0.0) > 0.0 
                                    else 0.0 -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.power|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('generated','defined')|
                map(attribute='generated')|select('is_number')|list|length ) > 0 -}}

      # Additional minutely updated "raw" sensor derived from Solar Analytics sourced data. A positive
      # value is power been drawn from the grid (imported) and a negative value is power being fed into
      # the grid (exported).
      #
      # Values for grid import are positive, values for export are negative.
      #
      # Return values: numeric if available, else none.
      #
      - name: sa_live_site_data_imported_exported
        unique_id: sa_live_site_data_imported_exported
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( power=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('consumed' in sensor_data and sensor_data.consumed is number) -%}
                {%- set consumed = sensor_data.consumed|float(0.0) -%}
                {#- Only positive generation contributes -#}
                {%- set generated = ( sensor_data.generated
                                      if sensor_data.generated|default(0.0)|float(0.0) > 0.0 
                                      else 0.0
                                    )|float(0.0) -%}
                {%- set battery = sensor_data.battery|default(0.0)|float(0.0) -%}
                {%- set ns.power = consumed + battery - generated -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.power|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('consumed','defined')|
                map(attribute='consumed')|select('is_number')|list|length ) > 0 -}}

  #
  # Solar Analytics - get hourly cumulative expected energy data for the day.
  # Used to report today's total expected generated energy to the most recent hour - a time lagging
  # report of expected, and not a forecast.
  # Notes: this is not a published API 'get', but is used by the SA portal.
  # The get also retrieves the daily total for the most recent hour for generated and consumed energy;
  # not required given 5 min updates of the same above. Checked every 30 minutes for changes in the last hour.
  #
  # Updated on startup and every 5 minutes according to sa_data_by_hour_trigger.
  #
  - resource_template: https://portal.solaranalytics.com.au/api/v2/site_data/{{-
      states('input_text.sa_site_id')
      -}}?all=false&gran=day&losses=true&power=false&trunc=false&tstart={{-
      now().strftime("%Y%m%d")
      -}}&tend={{-
      now().strftime("%Y%m%d")
      -}}
    headers:
      Authorization: >-
        {{- 'Bearer ' ~ state_attr('sensor.sa_auth_token','token') -}}
    scan_interval: 0
    # REST SENSORS FOR sa_data_by_hour_... sensor (just one).
    sensor:

      # Return values: current time if data available, else none.
      #
      # Note: rest get timestamp is only the current date - rather use the current date-time of the get.
      #      {{- as_timestamp(value_json['data'][0].t_stamp)|timestamp_custom ('%Y-%m-%d %H:%M:%S') -}}
      - name: sa_data_by_hour_time_stamp
        unique_id: sa_data_by_hour_time_stamp
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {{- as_timestamp(now())|timestamp_custom ('%Y-%m-%d %H:%M:%S') -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|map(attribute='energy_expected')|select('is_number')|list|length ) > 0 -}}

      # Total Energy Generated Expected
      #
      # Return values: numeric if available and positive, else 0.0 if negative, else none.
      #
      - name: sa_data_by_hour_generated_expected
        unique_id: sa_data_by_hour_generated_expected
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( expected=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if sensor_data.energy_expected is number -%}
                {%- set ns.expected = sensor_data.energy_expected 
                    if sensor_data.energy_expected|float(0.0) > 0.0 -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.expected|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_expected','defined')|
                map(attribute='energy_expected')|select('is_number')|list|length ) > 0 -}}

