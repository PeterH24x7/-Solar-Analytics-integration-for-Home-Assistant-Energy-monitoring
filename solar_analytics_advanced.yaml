  - trigger:
      - platform: state
        entity_id: sensor.sa_data_by_hour_time_stamp
        not_to:
          - "unknown"
          - "unavailable"
          - "none"
        for: "00:00:02"

    sensor:
      # Expected solar generation to current hour - updated hourly
      #
      # Importantly, the sensor is stabilised by clamping near-zero noise variations
      # that may occur during nighttime hours. Both the previous (old) value and the 
      # new upstream value are normalised to zero in this region to eliminate micro-
      # step changes that cause template loop warnings.
      #
      # The sensor preserves valid state and only reacts to meaningful monotonic 
      # changes — eliminating template loops and improving real-world accuracy.
      #
      # Return values: numeric if available, else previous value else 0.0.
      #
      - name: "Total Energy Generated Expected"
        default_entity_id: sensor.sa_todays_energy_generated_expected_total
        unique_id: sa_todays_energy_generated_expected_total
        unit_of_measurement: "Wh"
        icon: mdi:solar-power
        device_class: "energy"
        state_class: "total"
        state: >-
          {%- set new = states('sensor.sa_data_by_hour_generated_expected')|float(none) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if new is number -%}
            {%- set new_val = new|float(0.0) -%}
            {#- Clamp near-zero noise -#}
            {%- if new_val < 0.0001 -%}
              0.0
            {%- elif (new_val - old)|abs < 0.01 -%}
              {{- old -}}
            {%- else -%}
              {{- new_val -}}
            {%- endif -%}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_hour_time_stamp') -}}"

