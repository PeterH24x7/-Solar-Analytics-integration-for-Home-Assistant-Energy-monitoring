        state_class: "total_increasing"
        state: >-
          {%- set new = states('sensor.sa_data_by_5min_energy_consumed_total')|float(none) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- set RESET_THRESHOLD = 5.0 -%}
          {%- if new is number -%}
            {%- set new_val = new|float(0.0) -%}
            {#- SMALL NEGATIVE DRIFT (rounding, calc noise) -#}
            {%- if new_val < old and (old - new_val) < 0.01 -%}
              {{- old -}}
            {#- TRUE RESET (large drop) -#}
            {%- elif new_val < old and (old - new_val) > RESET_THRESHOLD -%}
              {{- new_val -}}
            {#- NORMAL INCREASE -#}
            {%- elif new_val > old -%}
              {{- new_val -}}
            {#- HOLD VALUE -#}
            {%- else -%}
              {{- old -}}
            {%- endif -%}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          last5min: "{{- states('sensor.sa_data_by_5min_energy_consumed') -}}"

