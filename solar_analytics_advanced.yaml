      # Additional daily cumulative total "raw" sensors that reset at midnight.
      # These sensors are derived/calculated from the main Solar Analytics channels.
      #
      # Return values: numeric if available, else previous value else default 0.0.
      #
      - name: sa_data_by_5min_imported_total
        unique_id: sa_data_by_5min_imported_total
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( imported=0.0, consumed_home=0.0, generated=0.0, battery=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.battery = sensor_data.battery_storage|default(0.0)|float(0.0) -%}
                {%- set ns.consumed_home = sensor_data.energy_consumed|float(0.0) 
                      + 2.0 * ns.battery|float(0.0) -%}
                {#- Only positive generation contributes -#}
                {%- set ns.generated = sensor_data.energy_generated|float(0.0) 
                      if sensor_data.energy_generated|default(0.0)|float(0.0) > 0.0 else 0.0 -%}
                {%- if ns.consumed_home|float(0.0) - ns.battery|float(0.0)
                        >= ns.generated|float(0.0) -%}
                  {%- set ns.imported = ns.imported|float(0.0) 
                      + ns.consumed_home|float(0.0) - ns.battery|float(0.0) - ns.generated|float(0.0) -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.imported|float(0.0)|round(4) -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_imported_total')|float(0.0) -}} 
          {%- endif -%}
