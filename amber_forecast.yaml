# ----------------------------------------------------------------------------- 
# >>> RELEASE 10 FINAL - <<< AMBER FORECAST
#
# AMBER extras integration for Home Assistant Energy Management. 
# Requires HA Amber Electric Integration to be installed.
# 
# Developed by Peter Hormann
#
# Created: 9-Feb-2023
#
# Last updated: 24-May-26
#
# Updates: 
#   2-Jun-23  - improved error checking for when nem_date is not defined.
#   13-Dec-25 - to meet modern template sensor format (old format to be deprecated 30-Jun-26).
#   7-Jan-26  - fixed system log error when nem_date doesn't exist (amber data is trucated).
#   24-May-26 - Improved state preservation when upstream data is unavailable
#             - Added safer datetime handling for nem_date parsing
#             - Prevented transient 'unknown/unavailable' churn during startup/reload
#             - Ensured attribute arrays are only rebuilt when valid dat
#
# Creates a new "amber_forecast" sensor which contains the curent time and 24 hours 
# future time in 30 minute increments, the general forecast prices and the feed-in 
# forecast prices stored in an array format suitable for use by a Apex Chart card 
# (installed via HACS) - see <amber_forecast_chart.yaml> for the card YAML code.
#
# Installation: 
#   1. Copy this yaml file to the HA config directory.
#   2. Include this file name as a package in the HA <configuration.yaml>. Package names must be unique.
#      For example -
#        packages:
#          pack_x: !include amber_forecast.yaml
#   3. Rename "amber12ayrst_xyz" sensors to match HA Amber installation device naming.
#   4. Ensure the Developer Tools > YAML > Check Configuration passes without error.
#   5. Restart HA, or simply use YAML Configuration Reloading > Template Entities.
#   6. Enjoy!
#
# If you find my work useful, please buy me a coffee ... thank you!
#   https://www.buymeacoffee.com/peter24x7
#
# Reference for more information and updates:
#   https://github.com/PeterH24x7/-Solar-Analytics-integration-for-Home-Assistant-Energy-monitoring
#
# -----------------------------------------------------------------------------

template:
  - sensor:
      - name: "Amber Forecast"
        default_entity_id: sensor.amber_forecast
        unique_id: amber_forecast
        icon: mdi:chart-line
        state: >-
          {%- set nem_date = state_attr('sensor.amber12ayrst_general_price', 'nem_date') -%}
          {%- set dt = as_datetime(nem_date) if nem_date else none -%}
          {%- if dt is not none -%}
            {{- as_local(dt - timedelta(minutes=30)).strftime("%Y-%m-%d %H:%M:%S") -}}
          {%- else -%}
            {{- this.state if this.state not in ['unknown','unavailable'] else 'unavailable' -}}
          {%- endif -%}
        attributes:
          times: >-
            {%- set data = state_attr('sensor.amber12ayrst_general_forecast', 'forecasts') -%}
            {%- set nem_date = state_attr('sensor.amber12ayrst_general_price', 'nem_date') -%}
            {%- if data is iterable and nem_date -%}
              {%- set ns = namespace(arr=[as_local(as_datetime(nem_date) - timedelta(minutes=30)).strftime("%Y-%m-%d %H:%M:%S")]) -%}
              {%- for rec in data -%}
                {%- if rec.nem_date is defined -%}
                  {%- set t = as_local(as_datetime(rec.nem_date) - timedelta(minutes=30)).strftime("%Y-%m-%d %H:%M:%S") -%}
                  {%- set ns.arr = ns.arr + [t] -%}
                {%- endif -%}
              {%- endfor -%}
              {{- ns.arr -}}
            {%- else -%}
              {{- state_attr('sensor.amber_forecast','times') 
                  if state_attr('sensor.amber_forecast','times') else [] -}}
            {%- endif -%}
          general_price: >-
            {%- set data = state_attr('sensor.amber12ayrst_general_forecast', 'forecasts') -%}
            {%- if data is iterable -%}
              {%- set ns = namespace(arr=[states('sensor.amber12ayrst_general_price')|float]) -%}
              {%- for rec in data -%}
                {%- if rec.per_kwh is defined -%}
                  {%- set ns.arr = ns.arr + [rec.per_kwh] -%}
                {%- endif -%}
              {%- endfor -%}
              {{- ns.arr -}}
            {%- else -%}
              {{- state_attr('sensor.amber_forecast','general_price') 
                  if state_attr('sensor.amber_forecast','general_price') else [] -}}
            {%- endif -%}
          fit_price: >-
            {%- set data = state_attr('sensor.amber12ayrst_general_forecast', 'forecasts') -%}
            {%- if data is iterable -%}
              {%- set ns = namespace(arr=[]) -%}
              {%- for rec in data -%}
                {%- set price = rec.spot_per_kwh if rec.spot_per_kwh is defined else none -%}
                {%- set ns.arr = ns.arr + [price | float(0.0)] -%}
              {%- endfor -%}
              {{- ns.arr -}}
            {%- else -%}
              {{- state_attr('sensor.amber_forecast','fit_price') if state_attr('sensor.amber_forecast','fit_price') else [] -}}
            {%- endif -%}
          renewables_percent: >-
            {%- set data = state_attr('sensor.amber12ayrst_general_forecast', 'forecasts') -%}
            {%- if data is iterable -%}
              {%- set ns = namespace(arr=[]) -%}
              {%- for rec in data if rec.renewables is defined -%}
                {%- set ns.arr = ns.arr + [rec.renewables | float(0.0)] -%}
              {%- endfor -%}
              {{- ns.arr -}}
            {%- else -%}
              {{- state_attr('sensor.amber_forecast','renewables_percent') 
                  if state_attr('sensor.amber_forecast','renewables_percent') else [] -}}
            {%- endif -%}

# -----------------------------------------------------------------------------
