# ------------------------------------------------------------------------------
# >>> RELEASE 10 FINAL - <<< AMBER EV CHARGE COST
#
# EV charging integration for Home Assistant Energy Management. 
# Requires <solar_analytics.yaml> or <solar_analytics_advanced.yaml> to be installed or an alternative source
# of imported and generated Watt-hour device load data.
# 
# Developed by Peter Hormann
#
# Created: 9-Apr-2023
#
# Last updated: 24-May-26
#
# Updates: 
#   18-May-23 - fixed meter resetting based on daily trigger at midnight.
#   2-Jun-23  - fixed error detection.
#   13-Dec-25 - to meet modern template sensor format (old format to be deprecated 30-Jun-26).
#   30-Dec-25 - fixed amber_todays_..._rate_av occasional unavailable errors in sys-log.
#   24-May-26 - Updated charging cost sensors to align with Release 10 hardened template patterns:
#             - Replaced direct entity self-references with state-preserving logic using this.state
#             - Improved numerical safety using float(none) and state_attr() to handle startup and unavailable states
#             - Eliminated transient resets to 0.0 by preserving last valid values when inputs are invalid
#             - Added change-guard logic to suppress minor calculation jitter and unnecessary state updates
#             - Standardised incremental and cumulative cost calculations for improved stability and accuracy
#             - Ensured consistent handling of last5min energy attributes and Amber price inputs
#
# Calculate EV cost to charge for both generated and imported energy, total net 
# cost and average combined charging rate for the day.
#
# ALSO, defines amber_meter_reset to trigger amber_..._cost.yaml midnight reset to zero.
#
# If not using Solar Analytics, this integration requires a source of vehicle charged 
# generated or imported sources updated in 5 minute interval Watt-hours. A binary 
# sensor (replacing sa_data_by_5min_meter_reset) is also required to indicate if/when 
# the metering period has been reset - e.g. at midnight - must be true for one 5 
# minute interval.
#
# If not using the Amber Energy integration, then replace the last_price attribute
# with an alternative energy price sensor (or simply a constant - e.g. 0.25).
#
# Installation: 
#   1. Copy this yaml file to the HA config directory.
#   2. Include this file name as a package in the HA <configuration.yaml>. Package names must be unique.
#      For example -
#        packages:
#          pack_1: !include solar_analytics_advanced.yaml
#          pack_2: !include amber_ev_charge_cost.yaml
#   3. Rename "amber12ayrst_xyz" sensors to match HA Amber installation sensor naming.
#   4. Ensure the Developer Tools > YAML > Check Configuration passes without error.
#   5. Restart HA, or simply use YAML Configuration Reloading > Template Entities.
#   6. Enjoy!
#
# If you find my work useful, please buy me a coffee ... thank you!
#   https://www.buymeacoffee.com/peter24x7
#
# Reference for more information and updates:
#   https://github.com/PeterH24x7/-Solar-Analytics-integration-for-Home-Assistant-Energy-monitoring
#
# -----------------------------------------------------------------------------

template:
  - sensor:
    - name: "Electric Vehicle Total Cost"
      default_entity_id: sensor.amber_todays_electric_vehicle_total_cost
      unique_id: amber_todays_electric_vehicle_total_cost
      unit_of_measurement: "AUD"
      device_class: "monetary"
      icon: mdi:cash
      state_class: total
      state: >-
        {%- set imported_cost = states('sensor.amber_todays_electric_vehicle_imported_cost')|float(none) -%}
        {%- set generated_cost = states('sensor.amber_todays_electric_vehicle_generated_cost')|float(none) -%}
        {%- set old = this.state|float(0.0) -%}
        {%- if imported_cost is not none and generated_cost is not none -%}
          {%- set new_val = imported_cost + generated_cost -%}
          {{- new_val if (new_val - old)|abs > 0.0001 else old -}}
        {%- else -%}
          {{- old -}}
        {%- endif -%}
      attributes:
        time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"

    - name: "Electric Vehicle Rate Average"
      default_entity_id: sensor.amber_todays_electric_vehicle_rate_av
      unique_id: amber_todays_electric_vehicle_rate_av
      unit_of_measurement: "$/kWh"
#      device_class: "monetary"
      icon: mdi:cash-plus
      state_class: measurement
      state: >-
        {#- Safely read inputs as numeric (None if invalid) -#}
        {%- set cost = states('sensor.amber_todays_electric_vehicle_total_cost')|float(none) -%}
        {%- set load = states('sensor.sa_data_by_5min_load_ev_charger_total')|float(none) -%}
        {#- Previous value (state preservation pattern) -#}
        {%- set old = this.state|float(0.0) -%}
        {#- Only calculate if we have valid data and meaningful load -#}
        {%- if cost is not none and load is not none and load > 100 -%}
          {%- set new_val = (cost / load * 1000.0) -%}
          {#- Only update if value has meaningfully changed (reduces churn) -#}
          {{- new_val|round(3) if (new_val - old)|abs > 0.0001 else old -}}
        {#- Otherwise preserve previous valid value (do NOT reset to zero) -#}
        {%- else -%}
          {{- old -}}
        {%- endif -%}
      attributes:
        time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"

#
# Daily energy metering reset sensor
# - defines amber_meter_reset to trigger amber_..._cost.yaml.
#
# Meter resets at midnight.
  - trigger:
    - platform: time
      at: "00:00"
    binary_sensor:
      - name: "amber_meter_reset"
        unique_id: amber_meter_reset
        state: "on"
        auto_off: "00:00:10"
        attributes:
          time_stamp: "{{- as_timestamp(now())|timestamp_custom ('%Y-%m-%d %H:%M:%S') -}}"

  - trigger:
    - platform: state
      entity_id: sensor.sa_todays_electric_vehicle_generated
      attribute: time_stamp
    sensor:
      - name: "amber_todays_electric_vehicle_generated_cost_inc"
        unique_id: amber_todays_electric_vehicle_generated_cost_inc
        state: >-
          {%- set ev_wh = state_attr('sensor.sa_todays_electric_vehicle_generated', 'ev_energy_last5min')|float(0.0) -%}
          {%- set price = states('sensor.amber12ayrst_feed_in_price')|float(0.0) -%}
          {{- (price * ev_wh / 1000.0) if ev_wh > 0.0 else 0.0 -}}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          last_price: "{{- states('sensor.amber12ayrst_feed_in_price')|float(0.0) -}}"

  - trigger:
    - platform: state
      entity_id: sensor.sa_todays_electric_vehicle_imported
      attribute: time_stamp
    sensor:
      - name: "amber_todays_electric_vehicle_imported_cost_inc"
        unique_id: amber_todays_electric_vehicle_imported_cost_inc
        state: >-
          {%- set ev_wh = state_attr('sensor.sa_todays_electric_vehicle_imported', 'ev_energy_last5min')|float(0.0) -%}
          {%- set price = states('sensor.amber12ayrst_general_price')|float(0.0) -%}
          {{- (price * ev_wh / 1000.0) if ev_wh > 0.0 else 0.0 -}}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          last_price: "{{- states('sensor.amber12ayrst_general_price')|float(0.0) -}}"


  - trigger:
    - platform: state
      entity_id: sensor.amber_todays_electric_vehicle_generated_cost_inc
      attribute: time_stamp
    - platform: state
      entity_id: binary_sensor.amber_meter_reset
      from:
        - "off"
        - "unknown"
        - "unavailable"
      to: "on"
    sensor:
      - name: "Electric Vehicle Generated Cost"
        unique_id: amber_todays_electric_vehicle_generated_cost
        unit_of_measurement: "AUD"
        device_class: "monetary"
        icon: mdi:cash
        state_class: total
        state: >-
          {%- set inc = states('sensor.amber_todays_electric_vehicle_generated_cost_inc')|float(none) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if is_state('binary_sensor.amber_meter_reset', 'on') -%}
            0.0
          {%- elif inc is not none -%}
            {{- old + inc -}}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: >-
            {{- state_attr('binary_sensor.amber_meter_reset', 'time_stamp')
                if is_state('binary_sensor.amber_meter_reset', 'on')
                else states('sensor.sa_data_by_5min_time_stamp') -}}

  - trigger:
    - platform: state
      entity_id: sensor.amber_todays_electric_vehicle_imported_cost_inc
      attribute: time_stamp
    - platform: state
      entity_id: binary_sensor.amber_meter_reset
      from:
        - "off"
        - "unknown"
        - "unavailable"
      to: "on"
    sensor:
      - name: "Electric Vehicle Imported Cost"
        unique_id: amber_todays_electric_vehicle_imported_cost
        unit_of_measurement: "AUD"
        device_class: "monetary"
        icon: mdi:cash
        state_class: total
        state: >-
          {%- set inc = states('sensor.amber_todays_electric_vehicle_imported_cost_inc')|float(none) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if is_state('binary_sensor.amber_meter_reset', 'on') -%}
            0.0
          {%- elif inc is not none -%}
            {{- old + inc -}}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: >-
            {{- state_attr('binary_sensor.amber_meter_reset', 'time_stamp')
                if is_state('binary_sensor.amber_meter_reset', 'on')
                else states('sensor.sa_data_by_5min_time_stamp') -}}

# -----------------------------------------------------------------------------
