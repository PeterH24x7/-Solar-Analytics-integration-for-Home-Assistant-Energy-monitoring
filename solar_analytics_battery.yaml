                {%- if ns.battery|float(0.0) > 0.0 -%} 
                  {%- if ns.generated|float(0.0) 
                      >= ns.consumed_home|float(0.0) + ns.battery|float(0.0) -%}
                      {#- Do nothing -#}
                  {%- elif ns.consumed_home|float(0.0) 
                      >= ns.generated|float(0.0) -%}
                    {%- set ns.battery_in = ns.battery_in|float(0.0) 
                          + ns.battery|float(0.0) -%}
                  {%- elif ns.generated|float(0.0) > ns.consumed_home|float(0.0) -%}
                    {%- set ns.battery_in = ns.battery_in|float(0.0) 
                          + ns.consumed_home|float(0.0) + ns.battery|float(0.0)
                          - ns.generated|float(0.0) 
                      -%}                  
                  {%- endif -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.battery_in|float(0.0)|round(4) -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_battery_storage_in_imported_total')|float(0.0) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('battery_storage','defined')|
                map(attribute='battery_storage')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_battery_storage_out_consumed_total
        unique_id: sa_data_by_5min_battery_storage_out_consumed_total
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( battery=0.0, consumed_home=0.0, generated=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('battery_storage' in sensor_data and sensor_data.battery_storage is number) 
                  and (sensor_data.battery_storage|float(0.0) > 0.0) -%}
                {%- set ns.consumed_home = sensor_data.energy_consumed|float(0.0) 
                      + 2.0 * sensor_data.battery_storage|default(0.0)|float(0.0) -%}
                {%- set ns.generated = sensor_data.energy_generated 
                      if sensor_data.energy_generated|default(0.0)|float(0.0) > 0.0 else 0.0 -%}
                {%- if ns.consumed_home|float(0.0) >= ns.generated|float(0.0) + sensor_data.battery_storage|float(0.0) -%}
                  {%- set ns.battery = ns.battery + sensor_data.battery_storage|float(0.0) -%}
                {%- elif ns.generated|float(0.0) < ns.consumed_home|float(0.0) -%}
                  {%- set ns.battery = ns.battery
                        + ns.consumed_home|float(0.0) - ns.generated|float(0.0) -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.battery|float(0.0)|round(4) -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_battery_storage_out_consumed_total')|float(0.0) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('battery_storage','defined')|
                map(attribute='battery_storage')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_battery_storage_out_exported_total
        unique_id: sa_data_by_5min_battery_storage_out_exported_total
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( exported=0.0, consumed_home=0.0, generated=0.0, battery=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('battery_storage' in sensor_data and sensor_data.battery_storage is number) -%}
                {%- set ns.consumed_home = sensor_data.energy_consumed|default(0.0)|float(0.0) 
                      + 2.0 * sensor_data.battery_storage|default(0.0)|float(0.0) -%}
                {%- set ns.generated = sensor_data.energy_generated 
                      if sensor_data.energy_generated|default(0.0)|float(0.0) > 0.0 else 0.0 -%}
                {%- set ns.battery = sensor_data.battery_storage|default(0.0)|float(0.0) -%}
                {%- if ns.battery|float(0.0) >= 0.0 -%}
                  {%- if ns.generated|float(0.0) > ns.consumed_home|float(0.0) -%}
                    {%- set ns.exported = ns.exported|float(0.0) + ns.battery|float(0.0) -%}
                  {%- elif ns.consumed_home|float(0.0) < ns.battery|float(0.0) + ns.generated|float(0.0) -%}
                    {%- set ns.exported = ns.exported|float(0.0)
                          + ns.battery|float(0.0) + ns.generated|float(0.0) - ns.consumed_home|float(0.0) -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.exported|float(0.0)|round(4) -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_battery_storage_out_exported_total')|float(0.0) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('battery_storage','defined')|
                map(attribute='battery_storage')|select('is_number')|list|length ) > 0 -}}
  #
  ### BATTERY STORAGE - END <<<<<<<<<<
  #

      # Solar Analytics Energy history sensor for graphing each channel (e.g. in Apex Charts).
      # The units are in kW.
      #
      # Note: results are actually 5 minute average power, with area under the graph being the energy
      # usage within that time interval. The time duration is limited to 28x 5 minute intervals
      # (= 2h20m) as this fits within the 255 character max allowed by the state of a sensor.
      # Rounding to a reduced number of decimal places (e.g. 1 instead of 2) could increase
      # the number of intervals if that's desireable, but at a lower resolution.
      #
      # Return values: numeric array if available, else previous else empty array [].
      #
      - name: sa_data_by_5min_history_time_stamp
        unique_id: sa_data_by_5min_history_time_stamp
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0, sensor_values=[] ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for sensor_data in value_json.data -%}
              {%- if (loop.index > (ns.last_data - 28)) and (loop.index <= ns.last_data) -%}
                {%- set ns.sensor_values = ns.sensor_values 
                    + [ as_timestamp(sensor_data.t_stamp)|timestamp_custom('%H:%M') ] -%}              
              {%- endif -%}
            {%- endfor -%}
            {{- ns.sensor_values -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_time_stamp')|default([]) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_history_energy_consumed
        unique_id: sa_data_by_5min_history_energy_consumed
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0, sensor_values=[], current_value=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for sensor_data in value_json.data -%}
              {%- if (loop.index > (ns.last_data - 28)) and (loop.index <= ns.last_data) -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                  {%- set ns.current_value = ((sensor_data.energy_consumed|float)*12.0/1000)|float(0.0)|round(2) -%}
                {%- else -%}
                  {#- data must be bad (none) - default to repeat last value -#}
                {%- endif -%}
                {%- set ns.sensor_values = ns.sensor_values + [ ns.current_value ] -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.sensor_values -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_energy_consumed')|default([]) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_history_energy_generated
        unique_id: sa_data_by_5min_history_energy_generated
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0, sensor_values=[], current_value=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for sensor_data in value_json.data -%}
              {%- if (loop.index > (ns.last_data - 28)) and (loop.index <= ns.last_data) -%}
                {%- if ('energy_generated' in sensor_data and sensor_data.energy_generated is number) -%}
                  {%- if sensor_data.energy_generated|float(0.0) > 0.0 -%}
                    {%- set ns.current_value = ((sensor_data.energy_generated|float)*12.0/1000)|float(0.0)|round(2) -%}
                  {%- else -%}
                    {#- Protect generated data from negative values (i.e. when the inverter is operating 
                        without solar input) -#}
                    {%- set ns.current_value = 0.0 -%}
                  {%- endif -%}
                {%- else -%}
                  {#- data must be bad (none) - default to repeat last value -#}
                {%- endif -%}
                {%- set ns.sensor_values = ns.sensor_values + [ ns.current_value ] -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.sensor_values -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_energy_generated')|default([]) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_generated','defined')|
                map(attribute='energy_generated')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_history_imported_exported
        unique_id: sa_data_by_5min_history_imported_exported
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0, sensor_values=[], current_value=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for sensor_data in value_json.data -%}
              {%- if (loop.index > (ns.last_data - 28)) and (loop.index <= ns.last_data) -%}
                {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                  {%- set ns.current_value = ( ( sensor_data.energy_consumed|float(0.0) 
                            + sensor_data.battery_storage|default(0.0)|float(0.0)
                            - ( sensor_data.energy_generated
                                  if sensor_data.energy_generated|default(0.0)|float(0.0) > 0.0
                                  else 0.0
                              )|float(0.0)
                            ) * 12.0 / 1000
                          )|float(0.0)|round(2) 
                    -%}
                {%- else -%}
                  {#- data must be bad (none) - default to repeat last value -#}
                {%- endif -%}
                {%- set ns.sensor_values = ns.sensor_values + [ ns.current_value ] -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.sensor_values -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_imported_exported')|default([]) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

  #
  ### BATTERY STORAGE - START >>>>>>>>>>
  #
      - name: sa_data_by_5min_history_battery_storage
        unique_id: sa_data_by_5min_history_battery_storage
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0, sensor_values=[], current_value=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for sensor_data in value_json.data -%}
              {%- if (loop.index > (ns.last_data - 28)) and (loop.index <= ns.last_data) -%}
                {%- if ('battery_storage' in sensor_data and sensor_data.battery_storage is number) -%}
                  {%- set ns.current_value = (sensor_data.battery_storage|float(0.0)*12.0/1000)|float(0.0)|round(2) -%}
                {%- else -%}
                  {#- data must be bad (none) - default to repeat last value -#}
                {%- endif -%}
                {%- set ns.sensor_values = ns.sensor_values + [ ns.current_value ] -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.sensor_values -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_battery_storage')|default([]) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('battery_storage','defined')|
                map(attribute='battery_storage')|select('is_number')|list|length ) > 0 -}}

      - name: sa_data_by_5min_history_energy_consumed_home
        unique_id: sa_data_by_5min_history_energy_consumed_home
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0, sensor_values=[], current_value=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {%- for sensor_data in value_json.data -%}
              {%- if (loop.index > (ns.last_data - 28)) and (loop.index <= ns.last_data) -%}
                {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                  {%- set ns.current_value = ( ( sensor_data.energy_consumed|float(0.0) 
                              + ( sensor_data.battery_storage|default(0.0)|float(0.0) * 2 ) 
                            ) * 12.0 / 1000 )|round(2) -%}
                {%- else -%}
                  {#- data must be bad (none) - default to repeat last value -#}
                {%- endif -%}
                {%- set ns.sensor_values = ns.sensor_values + [ ns.current_value ] -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.sensor_values -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_energy_consumed_home')|default([]) -}}
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}
  #
  ### BATTERY STORAGE - END <<<<<<<<<<
  #

      # A count of the number of time intervals since midnight. Used to calculate a long date/time
      # value for sa_todays_energy_history.
      #
      # Return values: numeric if available, else previous value else default 0.
      #
      - name: sa_data_by_5min_history_time_stamp_count
        unique_id: sa_data_by_5min_history_time_stamp_count
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( last_data=0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.last_data = loop.index -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.last_data -}}
          {%- else -%}
            {{- states('sensor.sa_data_by_5min_history_time_stamp_count')|int(0) -}}
          {%- endif -%}
        json_attributes_path: "$.data[0]"
        json_attributes: "t_stamp"
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_consumed','defined')|
                map(attribute='energy_consumed')|select('is_number')|list|length ) > 0 -}}

  #
  # Solar Analytics - get live per minute power data.
  # Used to generate most recent power information.
  #
  # Note: this is not a published API 'get', but is used by the SA portal to display minute to
  # minute power for a site.
  #
  # Updated on startup and every 1 minute according to sa_live_site_data_trigger.
  #
  - resource_template:
      https://portal.solaranalytics.com.au/api/v3/live_site_data?site_id={{-
      states('input_text.sa_site_id')
      -}}&last_six=true
    headers:
      Authorization: >
        {{- 'Bearer ' ~ state_attr('sensor.sa_auth_token','token') -}}
    scan_interval: 0
    # REST SENSORS FOR sa_live_site_data...
    sensor:

      # Timestamp of the latest power data.
      # Return values: latest time stamp if available, else none.
      #
      - name: sa_live_site_data_time_stamp
        unique_id: sa_live_site_data_time_stamp
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( t_stamp=none ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('consumed' in sensor_data and sensor_data.consumed is number) -%}
                {%- set ns.t_stamp = as_timestamp(sensor_data.t_stamp)|timestamp_custom('%Y-%m-%d %H:%M:%S') -%}
              {%- endif -%}
            {%- endfor -%} 
            {{- ns.t_stamp -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('consumed','defined')|
                map(attribute='consumed')|select('is_number')|list|length ) > 0 -}}

      # Minutely updated "raw" power sensors as provided by Solar Analytics.
      #
      # Return values: numeric if available, else none.
      #
      - name: sa_live_site_data_consumed
        unique_id: sa_live_site_data_consumed
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( power=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('consumed' in sensor_data and sensor_data.consumed is number) -%}
                {%- set ns.power = sensor_data.consumed -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.power|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('consumed','defined')|
                map(attribute='consumed')|select('is_number')|list|length ) > 0 -}}

      - name: sa_live_site_data_generated
        unique_id: sa_live_site_data_generated
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( power=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('generated' in sensor_data and sensor_data.generated is number) -%}
                {#- Only positive generation contributes -#}
                {%- set ns.power = sensor_data.generated
                                    if sensor_data.generated|default(0.0)|float(0.0) > 0.0 
                                    else 0.0 -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.power|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('generated','defined')|
                map(attribute='generated')|select('is_number')|list|length ) > 0 -}}

      # Additional minutely updated "raw" sensor derived from Solar Analytics sourced data. A positive
      # value is power been drawn from the grid (imported) and a negative value is power being fed into
      # the grid (exported).
      #
      # Values for grid import are positive, values for export are negative.
      #
      # Return values: numeric if available, else none.
      #
      - name: sa_live_site_data_imported_exported
        unique_id: sa_live_site_data_imported_exported
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( power=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('consumed' in sensor_data and sensor_data.consumed is number) -%}
                {%- set consumed = sensor_data.consumed|float(0.0) -%}
                {#- Only positive generation contributes -#}
                {%- set generated = ( sensor_data.generated
                                      if sensor_data.generated|default(0.0)|float(0.0) > 0.0 
                                      else 0.0
                                    )|float(0.0) -%}
                {%- set battery = sensor_data.battery|default(0.0)|float(0.0) -%}
                {%- set ns.power = consumed + battery - generated -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.power|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('consumed','defined')|
                map(attribute='consumed')|select('is_number')|list|length ) > 0 -}}

  #
  ### BATTERY STORAGE - START >>>>>>>>>>
  #
      # Values for battery storage output are positive, values for input are negative.
      - name: sa_live_site_data_battery
        unique_id: sa_live_site_data_battery
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( power=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('battery' in sensor_data and sensor_data.battery is number) -%}
                {%- set ns.power = sensor_data.battery -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.power|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('battery','defined')|
                map(attribute='battery')|select('is_number')|list|length ) > 0 -}}

      # Household energy consumption excluding battery storage input or output.
      - name: sa_live_site_data_consumed_home
        unique_id: sa_live_site_data_consumed_home
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( power=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if ('consumed' in sensor_data and sensor_data.consumed is number) -%}
                {%- set consumed = sensor_data.consumed|float(0.0) -%}
                {%- set battery = sensor_data.battery|default(0.0)|float(0.0) -%}
                {%- set ns.power = sensor_data.consumed + 2*battery -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.power|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('consumed','defined')|
                map(attribute='consumed')|select('is_number')|list|length ) > 0 -}}
  #
  ### BATTERY STORAGE - END <<<<<<<<<<
  #

  #
  # Solar Analytics - get hourly cumulative expected energy data for the day.
  # Used to report today's total expected generated energy to the most recent hour - a time lagging
  # report of expected, and not a forecast.
  # Notes: this is not a published API 'get', but is used by the SA portal.
  # The get also retrieves the daily total for the most recent hour for generated and consumed energy;
  # not required given 5 min updates of the same above. Checked every 30 minutes for changes in the last hour.
  #
  # Updated on startup and every 5 minutes according to sa_data_by_hour_trigger.
  #
  - resource_template: https://portal.solaranalytics.com.au/api/v2/site_data/{{-
      states('input_text.sa_site_id')
      -}}?all=false&gran=day&losses=true&power=false&trunc=false&tstart={{-
      now().strftime("%Y%m%d")
      -}}&tend={{-
      now().strftime("%Y%m%d")
      -}}
    headers:
      Authorization: >-
        {{- 'Bearer ' ~ state_attr('sensor.sa_auth_token','token') -}}
    scan_interval: 0
    # REST SENSORS FOR sa_data_by_hour_... sensor (just one).
    sensor:

      # Return values: current time if data available, else none.
      #
      # Note: rest get timestamp is only the current date - rather use the current date-time of the get.
      #      {{- as_timestamp(value_json['data'][0].t_stamp)|timestamp_custom ('%Y-%m-%d %H:%M:%S') -}}
      - name: sa_data_by_hour_time_stamp
        unique_id: sa_data_by_hour_time_stamp
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {{- as_timestamp(now())|timestamp_custom ('%Y-%m-%d %H:%M:%S') -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|map(attribute='energy_expected')|select('is_number')|list|length ) > 0 -}}

      # Total Energy Generated Expected
      #
      # Return values: numeric if available and positive, else 0.0 if negative, else none.
      #
      - name: sa_data_by_hour_generated_expected
        unique_id: sa_data_by_hour_generated_expected
        value_template: >-
          {%- if value_json is defined and value_json.data is defined -%}
            {%- set ns = namespace( expected=0.0 ) -%}
            {%- for sensor_data in value_json.data -%}
              {%- if sensor_data.energy_expected is number -%}
                {%- set ns.expected = sensor_data.energy_expected 
                    if sensor_data.energy_expected|float(0.0) > 0.0 -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.expected|float(0.0)|round(4) -}}
          {%- else -%}
            none
          {%- endif -%}
        availability: >-
          {{- value_json is defined and value_json.data is defined
              and ( value_json.data|selectattr('energy_expected','defined')|
                map(attribute='energy_expected')|select('is_number')|list|length ) > 0 -}}

template:
  - trigger:
      - platform: state
        entity_id: sensor.sa_data_by_5min_time_stamp
        not_to:
          - "unknown"
          - "unavailable"
        for: "00:00:02"
    sensor:
      # Solar Analytics todays total energy sensors
      #
      # Return values: numeric if available, else previous value else 0.0.
      #
      - name: "Total Energy Consumed"
        default_entity_id: sensor.sa_todays_energy_consumed_total
        unique_id: sa_todays_energy_consumed_total
        unit_of_measurement: "Wh"
        icon: "mdi:home-lightning-bolt-outline"
        device_class: "energy"
        state_class: "total_increasing"
        state: >-
          {#- Read the new raw value from the upstream sensor (string) -#}
          {%- set new = states('sensor.sa_data_by_5min_energy_consumed_total')|float(none) -%}
          {#- Safely get the previous value of THIS sensor (no self-dependency loop) -#}
          {%- set old = this.state|float(0.0) -%}
          {%- if new|is_number -%}
            {#- Convert to numeric only after validating -#}
            {%- set new_val = new|float(0.0) -%}
            {#- --- Reset handling ---
              If value drops to very small (<1) and below previous,
              treat as a legitimate reset (e.g. midnight), BUT
              only update if it has actually changed to avoid loops -#}
            {%- if new_val < old and new_val < 1 -%}
              {{- new_val if new_val != old else this.state|float(0.0) -}}
            {#- --- Normal operation ---
              Allow updates only when the value increases (monotonic behaviour) -#}
            {%- elif new_val > old -%}
              {{- new_val -}}
            {#- --- No change / invalid decrease ---
              Return existing state WITHOUT rewriting to avoid loops -#}
            {%- else -%}
              {{- old -}}
            {%- endif -%}
          {%- else -%}
            {#- Input is invalid (e.g. unavailable) → preserve previous value -#}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          last5min: "{{- states('sensor.sa_data_by_5min_energy_consumed') -}}"

      - name: "Total Energy Generated"
        default_entity_id: sensor.sa_todays_energy_generated_total
        unique_id: sa_todays_energy_generated_total
        unit_of_measurement: "Wh"
        icon: mdi:solar-power
        device_class: "energy"
        state_class: "total_increasing"
        state: >-
          {%- set new = states('sensor.sa_data_by_5min_energy_generated_total')|float(none) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if new|is_number -%}
            {%- set new_val = new|float(0.0) -%}
            {%- if new_val < old and new_val < 1 -%}
              {{- new_val if (new_val - old)|abs > 0.0001 else this.state -}}
            {%- elif new_val > old -%}
              {{- new_val -}}
            {%- else -%}
              {{- old -}}
            {%- endif -%}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          last5min: "{{- states('sensor.sa_data_by_5min_energy_generated') -}}"

      # Solar Analytics derived total energy sensors
      - name: "Total Energy Imported"
        default_entity_id: sensor.sa_todays_energy_imported
        unique_id: sa_todays_energy_imported
        unit_of_measurement: "Wh"
        icon: mdi:transmission-tower-export
        device_class: "energy"
        state_class: "total_increasing"
        state: >-
          {%- set new = states('sensor.sa_data_by_5min_imported_total')|float(none) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if new is number -%}
            {%- set new_val = new|float(0.0) -%}
            {#- BLOCK SMALL DECREASES (rounding / kWh / calc drift) -#}
            {%- if new_val < old and (old - new_val) < 0.01 -%}
              {{- old -}}
            {#- TRUE RESET (near zero only) -#}
            {%- elif new_val < old and new_val < 0.01 -%}
              {{- new_val -}}
            {#- NORMAL INCREASE -#}
            {%- elif new_val > old -%}
              {{- new_val -}}
            {#- HOLD VALUE -#}
            {%- else -%}
              {{- old -}}
            {%- endif -%}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          last5min: "{{- states('sensor.sa_data_by_5min_imported') -}}"

      - name: "Total Energy Exported"
        default_entity_id: sensor.sa_todays_energy_exported
        unique_id: sa_todays_energy_exported
        unit_of_measurement: "Wh"
        icon: mdi:transmission-tower-import
        device_class: "energy"
        state_class: "total_increasing"
        state: >-
          {%- set new = states('sensor.sa_data_by_5min_exported_total')|float(none) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if new is number -%}
            {%- set new_val = new|float(0.0) -%}
            {%- if new_val < old and (old - new_val) < 0.01 -%}
              {{- old -}}
            {%- elif new_val < old and new_val < 0.01 -%}
              {{- new_val -}}
            {%- elif new_val > old -%}
              {{- new_val -}}
            {%- else -%}
              {{- old -}}
            {%- endif -%}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          last5min: "{{- states('sensor.sa_data_by_5min_exported') -}}"

