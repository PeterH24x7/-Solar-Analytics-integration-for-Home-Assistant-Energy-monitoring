              {%- if ('energy_consumed' in sensor_data and sensor_data.energy_consumed is number) -%}
                {%- set ns.battery = sensor_data.battery_storage|default(0.0)|float(0.0) -%}
                {%- set ns.consumed_home = sensor_data.energy_consumed|float(0.0) 
                      + 2.0 * ns.battery|float(0.0) -%}
                {#- Only positive generation contributes -#}
                {%- set ns.generated = sensor_data.energy_generated|float(0.0) 
                      if sensor_data.energy_generated|default(0.0)|float(0.0) > 0.0 else 0.0 -%}
                {%- if ns.battery|float(0.0) >= 0.0 -%}
                  {%- if ( ns.generated|float(0.0) > ns.consumed_home|float(0.0) ) 
                          or ( ns.consumed_home|float(0.0) < ns.battery|float(0.0) + ns.generated|float(0.0) ) -%}
                    {%- set ns.exported = ns.exported|float(0.0)
                          + ns.battery|float(0.0) + ns.generated|float(0.0) - ns.consumed_home|float(0.0) -%}
                  {%- endif -%}
                {%- else -%}
                  {%- if ns.generated|float(0.0) > ns.consumed_home|float(0.0) - ns.battery|float(0.0) -%}
                    {%- set ns.exported = ns.exported|float(0.0)
