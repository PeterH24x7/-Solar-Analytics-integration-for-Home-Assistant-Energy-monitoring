        icon: mdi:solar-power
        device_class: "energy"
        state_class: "total_increasing"
        state: >-
          {%- set new = states('sensor.sa_data_by_5min_consumed_solar_total')|float(none) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if new|is_number -%}
            {%- set new_val = new|float(0.0) -%}
            {{- new_val if new_val != old else this.state -}}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"

      #
      # Calculation logic considerate of total energy generated at start of the day
      # could be negative (i.e. the inverter has consumed energy at start-up).
      #
      # Percentage of generated energy that has been consumed.
      # Only shows valid sensor when the daily generated solar energy is greater than 100Wh.
      #
      # Return values: numeric if available, else previous value else 0.0.
      #
      - name: "Percentage Generated Energy Consumed"
        default_entity_id: sensor.sa_todays_generated_consumed_percentage
        unique_id: sa_todays_generated_consumed_percentage
        unit_of_measurement: "%"
        icon: mdi:solar-power
        state: >-
          {%- set consumed_solar = states('sensor.sa_data_by_5min_consumed_solar_total')|float(0.0) -%}
          {%- set generated_total = states('sensor.sa_data_by_5min_energy_generated_total')|float(0.0) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if generated_total > 0 -%}
            {%- if (consumed_solar < generated_total) and (consumed_solar > 100.0) -%}
              {%- set new_val = (consumed_solar / generated_total * 100.0)|round(1) -%}
              {{- new_val if new_val != old else this.state -}}
            {%- else -%}
              {{- 100.0 if 100.0 != old else this.state -}}
            {%- endif -%}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"

      # Percentage of consumed energy that has been generated.
      #
      # Return values: numeric if available, else previous value else 0.0.
      #
      - name: "Percentage Consumed Energy Generated"
        default_entity_id: sensor.sa_todays_consumed_generated_percentage
        unique_id: sa_todays_consumed_generated_percentage
        unit_of_measurement: "%"
        icon: mdi:solar-power
        state: >-
          {%- set consumed_solar = states('sensor.sa_data_by_5min_consumed_solar_total')|float(0.0) -%}
          {%- set consumed_total = states('sensor.sa_data_by_5min_energy_consumed_total')|float(0.0) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if consumed_total > 0 -%}
            {%- if (consumed_solar < consumed_total) and (consumed_solar > 100.0) -%}
              {%- set new_val = (consumed_solar / consumed_total * 100.0)|round(1) -%}
              {{- new_val if new_val != old else this.state -}}
            {%- else -%}
              {{- this.state -}}
            {%- endif -%}
          {%- else -%}
            0.0
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"

      #
      # Solar Analytics Energy history sensor for graphing each channel (e.g. in Apex Charts).
      # The units are in kW.
      #
      # Note: results are 5 minute average power, with area under the graph being the energy
      # usage within that time interval. The time duration is limited to 28x 5 minute intervals
      # (= 2h20m) as this fits within the 255 character max allowed by the state of a sensor.
      # Rounding to a reduced number of decimal places (e.g. 1 instead of 2) could increase
      # the number of intervals if that's desireable, but at a lower resolution. Lastly,
      # the history sensors as states from above are implemented as attributes so they
      # can be readily interpreted as lists.
      #
      - name: "Total Energy History"
        default_entity_id: sensor.sa_todays_energy_history
        unique_id: sa_todays_energy_history
        state: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
        icon: mdi:sun-clock
        attributes:
          times: >-
            {%- set ns = namespace( times=[],
                count = states('sensor.sa_data_by_5min_history_time_stamp_count')|int(0) ) -%}
            {%- for i in range(ns.count) -%}
              {%- if i > ns.count - 29 -%}
                {%- set ns.times = ns.times + [
                    as_local( 
                      as_datetime( states('sensor.sa_data_by_5min_time_stamp') )  
                      - timedelta(minutes=(ns.count*5)-((i+1)*5)) 
                      ).strftime("%Y-%m-%d %H:%M:%S") ] -%}
                {%- endif -%}
            {%- endfor -%}
            {{- ns.times -}}
          times_simple: >
            {{- states('sensor.sa_data_by_5min_history_time_stamp') -}}
          energy_consumed: >
            {{- states('sensor.sa_data_by_5min_history_energy_consumed') -}}
          energy_generated: >
            {{- states('sensor.sa_data_by_5min_history_energy_generated') -}}
          energy_imported_exported: >
            {{- states('sensor.sa_data_by_5min_history_imported_exported') -}}

  #
  ### BATTERY STORAGE - START >>>>>>>>>>
  #
          energy_battery_storage: >
              {{- states('sensor.sa_data_by_5min_history_battery_storage') -}}
          energy_consumed_home: >
              {{- states('sensor.sa_data_by_5min_history_energy_consumed_home') -}}
