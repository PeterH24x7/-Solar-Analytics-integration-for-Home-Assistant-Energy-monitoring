  - trigger:
      - platform: state
        entity_id: sensor.sa_data_by_hour_time_stamp
        not_to:
          - "unknown"
          - "unavailable"
          - "none"
        for: "00:00:02"

    sensor:
      # Expected solar generation to current hour - updated hourly
      #
      # Importantly, the sensor is stabilised by clamping near-zero noise variations
      # that may occur during nighttime hours. Both the previous (old) value and the 
      # new upstream value are normalised to zero in this region to eliminate micro-
      # step changes that cause template loop warnings.
      #
      # The sensor preserves valid state and only reacts to meaningful monotonic 
      # changes — eliminating template loops and improving real-world accuracy.
      #
      # Return values: numeric if available, else previous value else 0.0.
      #
      - name: "Total Energy Generated Expected"
        default_entity_id: sensor.sa_todays_energy_generated_expected_total
        unique_id: sa_todays_energy_generated_expected_total
        unit_of_measurement: "Wh"
        icon: mdi:solar-power
        device_class: "energy"
        state_class: "total"
        state: >-
          {#- Pull upstream hourly expected generation value and safely convert to float.
              Using float(none) allows detection of invalid input (unknown/unavailable).
            -#}
          {%- set new = states('sensor.sa_data_by_hour_generated_expected')|float(none) -%}
          {#- Read this sensors previous state using float() because HA states are strings.
              Using float(0.0) ensures we always have a numeric baseline.
            -#}
          {%- set old = this.state|float(0.0) -%}
          {#- CRITICAL: Clamp OLD value as well as NEW value.
              WHY:
              - Near-zero values (e.g. 1e-5 → 1e-8 → 1e-11) can continue stepping down
              - If only new_val is clamped, old remains slightly above zero
              - This causes HA to see a "real change" → triggers loop
              RESULT:
              - Both sides normalised → no artificial change → loop eliminated
            -#}
          {%- if old < 0.0001 -%}
            {%- set old = 0.0 -%}
          {%- endif -%}
          {#- Only proceed if upstream value is valid (i.e. not None)
              preventing bad API data from corrupting the sensor.
            -#}
          {%- if new is not none -%}
            {#- Convert new value to float for consistent numeric processing. -#}
            {%- set new_val = new|float(0.0) -%}
            {#- CLAMP VERY SMALL VALUES TO ZERO
                - Near-zero values can oscillate endlessly due to rounding noise
                - Causes repeated micro-updates → HA template loop detection
                - These values are physically meaningless (no real solar generation)
              RESULT:
                - Stabilises the sensor at zero near midnight / resets
              -#}
            {%- if new_val < 0.0001 -%}
              {%- set new_val = 0.0 -%}
            {%- endif -%}
            {#- RESET HANDLING BRANCH (e.g. midnight rollover)
                Condition:
                  - new value is less than previous value AND still near zero
                WHY:
                  - Daily totals reset to ~0 at midnight
                  - Allow real reset while suppressing micro fluctuations
              -#}
            {%- if new_val < old and new_val < 1 -%}
              {#- Only accept reset if the change is meaningful
                  - Prevents tiny numerical drift triggering updates
                  - Reduces HA churn and avoids loop detection
                -#}
              {{- new_val if (new_val - old)|abs > 0.0001 else old -}}
            {#- NORMAL OPERATION BRANCH (monotonic increase)
                Expected behaviour for cumulative totals
              -#}
            {%- elif new_val > old -%}
              {{- new_val -}}
            {#- NO CHANGE / INVALID DECREASE
                - Ignore jitter, noise or inconsistent API values
                - Preserve last valid stable state
              -#}
            {%- else -%}
              {{- old -}}
            {%- endif -%}
          {#- INVALID INPUT HANDLING
              - Upstream sensor unavailable or invalid
              - Preserve previous valid value instead of resetting
            -#}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_hour_time_stamp') -}}"

