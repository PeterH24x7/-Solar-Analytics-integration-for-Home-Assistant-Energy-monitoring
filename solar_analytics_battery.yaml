          {%- else -%}
            none
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          consumed_solar_total: "{{- states('sensor.sa_data_by_5min_consumed_solar_total') -}}"
          battery_storage_in_generated_total: "{{- states('sensor.sa_data_by_5min_battery_storage_in_generated_total') -}}"
          exported_generated_total: "{{- states('sensor.sa_data_by_5min_exported_generated_total') -}}"
          energy_generated_total: "{{- states('sensor.sa_data_by_5min_energy_generated_total')|float(0.0)|round(2) -}}"
          summed_total: >-
            {{- ( states('sensor.sa_data_by_5min_consumed_solar_total')|float(0.0)
                  + states('sensor.sa_data_by_5min_battery_storage_in_generated_total')|float(0.0)
                  + states('sensor.sa_data_by_5min_exported_generated_total')|float(0.0)
                )|round(2) -}}
          difference: >-
            {{- ( states('sensor.sa_data_by_5min_energy_generated_total')|float(0.0)
                  - ( states('sensor.sa_data_by_5min_consumed_solar_total')|float(0.0)
                      + states('sensor.sa_data_by_5min_battery_storage_in_generated_total')|float(0.0)
                      + states('sensor.sa_data_by_5min_exported_generated_total')|float(0.0) )
                )|round(4) -}}
        availability: >-
          {{- states('sensor.sa_data_by_5min_energy_generated_total')|float(none) is number -}}

      - name: "EXPORTED CHECK"
        default_entity_id: sensor.sa_exported_check
        unique_id: sa_exported_check
        state: >-
          {%- set exported = states('sensor.sa_todays_energy_exported')|float(none) -%}
          {%- set battery = states('sensor.sa_todays_battery_storage_out_exported')|float(0.0) -%}
          {%- set generated = states('sensor.sa_todays_energy_exported_generated')|float(0.0) -%}
          {%- if exported is number -%}
            {%- set diff = (exported - (battery + generated))|abs -%}
            {{- "TRUE" if diff < 0.01 else "FALSE" -}}
          {%- else -%}
            none
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          sa_todays_battery_storage_out_exported: "{{- states('sensor.sa_todays_battery_storage_out_exported') -}}"
          sa_todays_energy_exported_generated: "{{- states('sensor.sa_todays_energy_exported_generated') -}}"
          sa_todays_energy_exported: "{{- states('sensor.sa_todays_energy_exported') -}}"
          summed_total: >-
            {{- ( states('sensor.sa_todays_battery_storage_out_exported')|float(0.0)
                  + states('sensor.sa_todays_energy_exported_generated')|float(0.0)
                )|round(2) -}}
          difference: >-
            {{- ( states('sensor.sa_todays_energy_exported')|float(0.0)
                  - ( states('sensor.sa_todays_battery_storage_out_exported')|float(0.0)
                      + states('sensor.sa_todays_energy_exported_generated')|float(0.0) )
                )|round(4) -}}
        availability: >-
          {{- states('sensor.sa_todays_energy_exported')|float(none) is number -}}

      - name: "IMPORTED CHECK"
        default_entity_id: sensor.sa_imported_check
        unique_id: sa_imported_check
        state: >-
          {%- set imported = states('sensor.sa_todays_energy_imported')|float(none) -%}
          {%- set consumed = states('sensor.sa_todays_energy_consumed_home_imported_total')|float(0.0) -%}
          {%- set battery = states('sensor.sa_todays_battery_storage_in_imported')|float(0.0) -%}
          {%- if imported is number -%}
            {%- set diff = (imported - (consumed + battery))|abs -%}
            {{- "TRUE" if diff < 0.01 else "FALSE" -}}
          {%- else -%}
            none
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          sa_todays_battery_storage_in_imported: "{{- states('sensor.sa_todays_battery_storage_in_imported') -}}"
          sa_todays_energy_consumed_home_imported_total: "{{- states('sensor.sa_todays_energy_consumed_home_imported_total') -}}"
          sa_todays_energy_imported: "{{- states('sensor.sa_todays_energy_imported') -}}"
          summed_total: >-
            {{- ( states('sensor.sa_todays_battery_storage_in_imported')|float(0.0)
                  + states('sensor.sa_todays_energy_consumed_home_imported_total')|float(0.0)
                )|round(2) -}}
          difference: >-
            {{- ( states('sensor.sa_todays_energy_imported')|float(0.0)
                  - ( states('sensor.sa_todays_energy_consumed_home_imported_total')|float(0.0)
                      + states('sensor.sa_todays_battery_storage_in_imported')|float(0.0) )
                )|round(4) -}}
        availability: >-
          {{- states('sensor.sa_todays_energy_imported')|float(none) is number -}}

  #
  ### BATTERY STORAGE - START >>>>>>>>>>
  #
      - name: "BATTERY INPUT CHECK"
        default_entity_id: sensor.sa_battery_input_check
        unique_id: sa_battery_input_check
        state: >-
          {%- set storeage_in = states('sensor.sa_todays_battery_storage_in_total')|float(none) -%}
          {%- set generated = states('sensor.sa_todays_battery_storage_in_generated')|float(0.0) -%}
          {%- set imported = states('sensor.sa_todays_battery_storage_in_imported')|float(0.0) -%}
          {%- if storeage_in is number -%}
            {%- set diff = (storeage_in - (generated + imported))|abs -%}
            {{- "TRUE" if diff < 0.01 else "FALSE" -}}
          {%- else -%}
            none
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          sa_todays_battery_storage_in_generated: "{{- states('sensor.sa_todays_battery_storage_in_generated') -}}"
          sa_todays_battery_storage_in_imported: "{{- states('sensor.sa_todays_battery_storage_in_imported') -}}"
          sa_todays_battery_storage_in_total: "{{- states('sensor.sa_todays_battery_storage_in_total') -}}"
          summed_total: >-
            {{- ( states('sensor.sa_todays_battery_storage_in_generated')|float(0.0)
                  + states('sensor.sa_todays_battery_storage_in_imported')|float(0.0)
                )|round(2) -}}
          difference: >-
            {{- ( states('sensor.sa_todays_battery_storage_in_total')|float(0.0)
                  - ( states('sensor.sa_todays_battery_storage_in_generated')|float(0.0)
                      + states('sensor.sa_todays_battery_storage_in_imported')|float(0.0) )
                )|round(4) -}}
        availability: >-
          {{- states('sensor.sa_todays_battery_storage_in_total')|float(none) is number -}}

      - name: "BATTERY OUTPUT CHECK"
        default_entity_id: sensor.sa_battery_output_check
        unique_id: sa_battery_output_check
        state: >-
          {%- set storeage_out = states('sensor.sa_todays_battery_storage_out_total')|float(none) -%}
          {%- set consumed = states('sensor.sa_todays_battery_storage_out_consumed')|float(0.0) -%}
          {%- set exported = states('sensor.sa_todays_battery_storage_out_exported')|float(0.0) -%}
          {%- if storeage_out is number -%}
            {%- set diff = (storeage_out - (consumed + exported))|abs -%}
            {{- "TRUE" if diff < 0.01 else "FALSE" -}}
          {%- else -%}
            none
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          sa_todays_battery_storage_out_consumed: "{{- states('sensor.sa_todays_battery_storage_out_consumed') -}}"
          sa_todays_battery_storage_out_exported: "{{- states('sensor.sa_todays_battery_storage_out_exported') -}}"
          sa_todays_battery_storage_out_total: "{{- states('sensor.sa_todays_battery_storage_out_total') -}}"
          summed_total: >-
            {{- ( states('sensor.sa_todays_battery_storage_out_consumed')|float(0.0)
                  + states('sensor.sa_todays_battery_storage_out_exported')|float(0.0)
                )|round(2) -}}
          difference: >-
            {{- ( states('sensor.sa_todays_battery_storage_out_total')|float(0.0)
                  - ( states('sensor.sa_todays_battery_storage_out_consumed')|float(0.0)
                      + states('sensor.sa_todays_battery_storage_out_exported')|float(0.0) )
                )|round(4) -}}
        availability: >-
          {{- states('sensor.sa_todays_battery_storage_out_total')|float(none) is number -}}
  #
  ### BATTERY STORAGE - END <<<<<<<<<<
  #   
      #
      ### DELETE FOR RELEASE CODE - END <<<<<<<<<<
      #

    #
    # Home Assistant Energy Dashboard extras
    #
    #
    # Todays Energy Total Net Cost
    #
    # The HA Energy Dashboard automatically creates two entities respectively derived from the sa_todays_energy_imported 
    # and sa_todays_energy_exported, where:
    #   > sa_todays_energy_imported_cost - cost of imported energy
    #   > sa_todays_energy_exported_compensation - revenue from exported energy
    # This new entity provides the net cost (imported cost minus exported revenue)
    #
      - name: "Todays Energy Total Net Cost"
        default_entity_id: sensor.sa_todays_energy_total_net_cost
        unique_id: sa_todays_energy_total_net_cost
        unit_of_measurement: "AUD"
        device_class: "monetary"
        icon: mdi:cash
        state_class: "total"
        state: >-
          {%- set import_raw = states('sensor.sa_todays_energy_imported_cost') -%}
          {%- set export_raw = states('sensor.sa_todays_energy_exported_compensation') -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if import_raw|is_number and export_raw|is_number -%}
            {%- set new_val = import_raw|float(0.0) - export_raw|float(0.0) -%}
            {{- new_val if new_val != old else this.state|float(0.0) -}}
          {%- else -%}
            {{- old -}}
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"

  #
  # Todays Energy Import Rate
  #
  # Useful for those on a variable electricity import/general rate configured in the HA Energy Dashboard 
  # (e.g. peak/off-peak/shoulder, Amber Energy wholesale spot market pricing). The average import 
  # rate $/kWh = cumulative exported energy kWh divided by the cumulative imported energy revenue $. 
  # Resets to zero at midnight. The sensor sa_todays_energy_imported_cost is created by the 
  # HA Energy Dashboard when appropriate pricing is set-up for energy drawn from the grid.
  #
  # Defaults to previous value when the imported total Wh is < 100.
  #
  - trigger:
      - platform: state
        entity_id: sensor.sa_todays_energy_imported_cost
    sensor:
      - name: "Todays Energy Import Rate"
        unique_id: sa_todays_energy_import_rate
        unit_of_measurement: "$/kWh"
        device_class: "monetary"
        icon: mdi:cash-plus
        state: >-
          {%- set imported = states('sensor.sa_data_by_5min_imported_total')|float(0.0) -%}
          {%- set cost = states('sensor.sa_todays_energy_imported_cost')|float(0.0) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if imported > 0 -%}
            {%- if imported > 100 -%}
              {{- (cost / imported * 1000.0)|float(0.0)|round(3) -}}
            {%- else -%}
              {{- old -}}
            {%- endif -%}
          {%- else -%}
            0.0
          {%- endif -%}
        attributes:
          state_class: "measurement"
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
        availability: >-
          {{- states('sensor.sa_data_by_5min_imported_total')|float(0.0) > 0 -}}

  #
  # Todays Energy Export Rate
  #
  # Useful for those on a variable electricity feed-in (FIT) rate configured in the HA Energy Dashboard 
  # (e.g. peak/off-peak/shoulder, Amber Energy wholesale spot market pricing). The average export 
  # rate $/kWh = cumulative exported energy kWh divided by the cumulative exported energy revenue $. 
  # Resets to zero at midnight. The sensor sa_todays_energy_exported_compensation is created by the 
  # HA Energy Dashboard when appropriate pricing is set-up for energy returned to the grid. 
  #
  # Defaults to previous value when the imported total Wh is < 100.
  #
  - trigger:
      - platform: state
        entity_id: sensor.sa_todays_energy_exported_compensation
    sensor:
      - name: "Todays Energy Export Rate"
        unique_id: sa_todays_energy_export_rate
        unit_of_measurement: "$/kWh"
        device_class: "monetary"
        icon: mdi:cash-plus
        state: >-
          {%- set exported = states('sensor.sa_data_by_5min_exported_total')|float(0.0) -%}
          {%- set compensation = states('sensor.sa_todays_energy_exported_compensation')|float(0.0) -%}
          {%- set old = this.state|float(0.0) -%}
          {%- if exported > 0 -%}
            {%- if exported > 100 -%}
              {{- (compensation / exported * 1000.0)|float(0.0)|round(3) -}}
            {%- else -%}
              {{- old -}}
            {%- endif -%}
          {%- else -%}
            0.0
          {%- endif -%}
        attributes:
          state_class: "measurement"
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
        availability: >-
          {{- states('sensor.sa_data_by_5min_exported_total')|float(0.0) > 0 -}}

