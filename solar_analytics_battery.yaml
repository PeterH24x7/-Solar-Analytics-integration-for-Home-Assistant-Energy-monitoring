      - name: "HOUSEHOLD CONSUMED CHECK"
        default_entity_id: sensor.sa_household_consumed_check
        unique_id: sa_household_consumed_check
        state: >-
          {%- set consumed = states('sensor.sa_data_by_5min_energy_consumed_home_total')|float(none) -%}
          {%- set solar = states('sensor.sa_data_by_5min_consumed_solar_total')|float(0.0) -%}
          {%- set battery = states('sensor.sa_data_by_5min_battery_storage_out_consumed_total')|float(0.0) -%}
          {%- set imported = states('sensor.sa_data_by_5min_energy_consumed_home_imported_total')|float(0.0) -%}
          {%- if consumed is number -%}
            {%- set diff = (consumed - (solar + battery + imported))|abs -%}
            {{- "TRUE" if diff < 0.01 else "FALSE" -}}
          {%- else -%}
            none
          {%- endif -%}
        attributes:
          time_stamp: "{{- states('sensor.sa_data_by_5min_time_stamp') -}}"
          consumed_solar_total: "{{- states('sensor.sa_data_by_5min_consumed_solar_total') -}}"
          battery_storage_out_consumed_total: "{{- states('sensor.sa_data_by_5min_battery_storage_out_consumed_total') -}}"
          consumed_home_imported_total: "{{- states('sensor.sa_data_by_5min_energy_consumed_home_imported_total') -}}"
          consumed_home_total: "{{- states('sensor.sa_data_by_5min_energy_consumed_home_total')|float(0.0)|round(2) -}}"
          summed_total: >-
            {{- ( states('sensor.sa_data_by_5min_consumed_solar_total')|float(0.0)
                  + states('sensor.sa_data_by_5min_battery_storage_out_consumed_total')|float(0.0)
                  + states('sensor.sa_data_by_5min_energy_consumed_home_imported_total')|float(0.0)
                )|round(2) -}}
          difference: >-
            {{- ( states('sensor.sa_data_by_5min_energy_consumed_home_total')|float(0.0)
                  - ( states('sensor.sa_data_by_5min_consumed_solar_total')|float(0.0)
                      + states('sensor.sa_data_by_5min_battery_storage_out_consumed_total')|float(0.0)
                      + states('sensor.sa_data_by_5min_energy_consumed_home_imported_total')|float(0.0) )
                )|round(4) -}}
        availability: >-
          {{- states('sensor.sa_data_by_5min_energy_consumed_home_total')|float(none) is number -}}

      - name: "SOLAR GENERATED CHECK"
        default_entity_id: sensor.sa_solar_generated_check
        unique_id: sa_solar_generated_check
        state: >-
          {%- set generated = states('sensor.sa_data_by_5min_energy_generated_total')|float(none) -%}
          {%- set solar = states('sensor.sa_data_by_5min_consumed_solar_total')|float(0.0) -%}
          {%- set battery = states('sensor.sa_data_by_5min_battery_storage_in_generated_total')|float(0.0) -%}
